<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>customer_form</title>
    <style>
        span{color:red}
    </style>
</head>
<body>
<form th:action="@{/customer-response}"
      th:object="${customer}"
      method="POST">

    firstName:<input type="text"
                     th:field="*{firstName}"
                     placeholder="enter fn here!!!">

    <br><br>

    lastName(*):<input type="text"
                    th:field="*{lastName}"
                    placeholder="enter ln here!!!">

    <span th:if="${#fields.hasErrors('lastName')}"
          th:errors="*{lastName}">
          </span>
    <br><br>

    Enter coupons count:<input type="text" th:field="*{coupons}">
    <span th:if="${#fields.hasErrors('coupons')}"
          th:errors="*{coupons}" ></span>

    <br><br>

    Enter Pincode:<input type="text" th:field="*{pincode}">
    <span th:if="${#fields.hasErrors('pincode')}"
          th:errors="*{pincode}" ></span>

    <br><br>
    <button type="submit">Submit</button>

</form>

</body>
</html>
