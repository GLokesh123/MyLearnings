<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css"
          integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO"
          crossorigin="anonymous">
</head>
<body>
<!--<span th:text="${employees}"></span> -->
<h1>Employee Directory</h1>
<hr>
<form th:action="@{/employees/save-form}" method="GET">
    <input type="submit" value="Add Employee">
</form>
<br>
<table class="table">
<thead class="thead-dark">
<tr>
    <th scope="col">FirstName</th>
    <th scope="col">LastName</th>
    <th scope="col">Email</th>
    <th scope="col">Action</th>
</tr>
</thead>
<tbody>

<tr th:each="temp :${employees}">
    <td th:text="${temp.firstName}"></td>
    <td th:text="${temp.lastName}"></td>
    <td th:text="${temp.email}"></td>
    <td>
        <a th:href="@{/employees/update-form/{id}(id=${temp.id})}">Update</a>
    </td>
</tr>

</tbody>
</table>
</body>
</html>
