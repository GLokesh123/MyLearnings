spring.application.name=cruddemo

#datasource credentials
spring.datasource.url=jdbc:mysql://localhost:3306/student_tracker
spring.datasource.username=loki
spring.datasource.password=root

#disable spring banner
spring.main.banner-mode=false

#reduce logging to only warns and errors
logging.level.root=warn

#----------------------------------------------
#logging sql statements
logging.level.org.hibernate.SQL=debug

#logging VALUES of SQL statements
logging.level.org.hibernate.orm.jdbc.bind=trace

#enabling auto dropping if table exists first then creating table
# >spring.jpa.hibernate.ddl-auto=create

#enabling auto updating if table exists else create then update
spring.jpa.hibernate.ddl-auto=update